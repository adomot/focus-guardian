const svg=document.getElementById("svg"), NS="http://www.w3.org/2000/svg", RAD=6;
function roundedPath(pts){
  let d=`M ${pts[0][0]} ${pts[0][1]}`;
  for(let i=1;i<pts.length-1;i++){
    const [px,py]=pts[i-1],[cx,cy]=pts[i],[nx,ny]=pts[i+1];
    const v1=[Math.sign(cx-px),Math.sign(cy-py)],v2=[Math.sign(nx-cx),Math.sign(ny-cy)];
    const r1=Math.min(RAD,Math.hypot(cx-px,cy-py)/2),r2=Math.min(RAD,Math.hypot(nx-cx,ny-cy)/2);
    d+=` L ${cx-v1[0]*r1} ${cy-v1[1]*r1} Q ${cx} ${cy} ${cx+v2[0]*r2} ${cy+v2[1]*r2}`;
  }
  const l=pts[pts.length-1]; d+=` L ${l[0]} ${l[1]}`; return d;
}
const STROKE={reg:"#1a73e8",ana:"#2b2f36",data:"#9aa0a6",ret:"#1e8e3e"};
const MK={reg:"url(#m-reg)",ana:"url(#m-ana)",data:"url(#m-data)",ret:"url(#m-ret)"};
const MKS={reg:"url(#m-reg-s)",ana:"url(#m-ana-s)"};
for(const e of E){
  const p=document.createElementNS(NS,"path");
  p.setAttribute("d",roundedPath(e.pts)); p.setAttribute("fill","none");
  p.setAttribute("stroke",STROKE[e.k]);
  p.setAttribute("stroke-width", e.k==="data"?2.2:3.4);
  p.setAttribute("stroke-linecap","butt"); p.setAttribute("stroke-linejoin","round");
  if(e.k==="data") p.setAttribute("stroke-dasharray","2 5");
  p.setAttribute("marker-end",MK[e.k]);
  if(e.both) p.setAttribute("marker-start",MKS[e.k]);
  svg.appendChild(p);
}

const layer=document.getElementById("layer");
for(const g of GROUPS){
  const el=document.createElement("div"); el.className="group";
  el.style.left=g.x+"px"; el.style.top=g.y+"px"; el.style.width=g.w+"px"; el.style.height=g.h+"px";
  el.innerHTML=`<div class="g-head"><img src="${ICONS[g.icon]}"><span>${g.head}</span></div>`;
  layer.appendChild(el);
}
for(const c of CHIPS){
  const el=document.createElement("div"); el.className="chip "+c.cls;
  el.style.left=c.cx+"px"; el.style.top=c.cy+"px"; el.textContent=c.t; layer.appendChild(el);
}
for(const id in N){ const n=N[id];
  const el=document.createElement("div"); el.className="node"+(n.top?" top":"");
  el.style.left=n.cx+"px"; el.style.top=n.cy+"px";
  el.innerHTML=`<div class="ic"><img src="${ICONS[n.icon]}"></div><div class="txt"><div class="lb">${n.lb}</div>`+
    (n.sb?`<div class="sb">${n.sb}</div>`:"")+`</div>`;
  layer.appendChild(el);
}
for(const e of E){ if(!e.label) continue;
  const d=document.createElement("div"); d.className="albl "+e.k;
  d.style.left=e.lp[0]+"px"; d.style.top=e.lp[1]+"px"; d.textContent=e.label;
  document.getElementById("stage").appendChild(d);
}
document.title="RENDERED";
</script>
