<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #000; font-family: "Hiragino Sans", sans-serif; }
  .shot { position: absolute; inset: 0; opacity: 0; transition: opacity 1s ease; }
  .shot.on { opacity: 1; }
  .shot img { width: 1280px; height: 720px; object-fit: cover; }
  .kb img { animation: kb 14s linear forwards; }
  @keyframes kb { from { transform: scale(1.05); } to { transform: scale(1.14); } }

  .hud { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
  .corner { position: absolute; width: 46px; height: 46px; border: 3px solid rgba(255,255,255,.5); }
  .c1 { top: 22px; left: 22px; border-right: 0; border-bottom: 0; }
  .c2 { top: 22px; right: 22px; border-left: 0; border-bottom: 0; }
  .c3 { bottom: 22px; left: 22px; border-right: 0; border-top: 0; }
  .c4 { bottom: 22px; right: 22px; border-left: 0; border-top: 0; }
  .rec { position: absolute; top: 34px; left: 44px; color: #fff; font-size: 17px; font-weight: 800;
    letter-spacing: 2px; text-shadow: 0 1px 6px rgba(0,0,0,.8); display: flex; align-items: center; gap: 9px; }
  .rec .dot { width: 13px; height: 13px; border-radius: 50%; background: #ff3b30; animation: bl 1.2s infinite; }
  @keyframes bl { 50% { opacity: .25; } }
  .cam { position: absolute; top: 36px; right: 44px; color: rgba(255,255,255,.85); font-size: 15px;
    font-weight: 700; letter-spacing: 2px; text-shadow: 0 1px 6px rgba(0,0,0,.8); font-family: Menlo, monospace; }

  .status { position: absolute; bottom: 44px; left: 44px; padding: 13px 22px; border-radius: 12px;
    font-size: 20px; font-weight: 800; letter-spacing: 1px; color: #fff; opacity: 0; transition: opacity .6s;
    box-shadow: 0 6px 22px rgba(0,0,0,.5); }
  .status.on { opacity: 1; }
  #stOk { background: rgba(28,130,50,.88); }
  #stAn { background: rgba(190,140,20,.9); }
  #stNg { background: rgba(200,32,28,.92); }
  #stBk { background: rgba(28,130,50,.88); }

  .alert { position: absolute; inset: 0; z-index: 20; opacity: 0; transition: opacity .35s; pointer-events: none; }
  .alert.on { opacity: 1; }
  .alert .vig { position: absolute; inset: 0; border: 14px solid rgba(255,40,30,.65);
    box-shadow: inset 0 0 130px rgba(255,30,20,.45); animation: apulse 1.1s infinite; }
  @keyframes apulse { 50% { box-shadow: inset 0 0 60px rgba(255,30,20,.2); } }
  .alert .banner { position: absolute; top: 96px; width: 100%; text-align: center; }
  .alert .banner .inner { display: inline-block; background: rgba(160,18,14,.94); color: #fff;
    font-size: 30px; font-weight: 800; letter-spacing: 2px; padding: 16px 38px; border-radius: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,.6); }

  .rings { position: absolute; left: 50%; top: 42%; z-index: 15; opacity: 0; transition: opacity .8s; }
  .rings.on { opacity: 1; }
  .rings i { position: absolute; left: 0; top: 0; width: 60px; height: 60px; margin: -30px;
    border: 3px solid rgba(255,120,80,.85); border-radius: 50%; animation: ring 1.8s ease-out infinite; }
  .rings i:nth-child(2) { animation-delay: .6s; }
  .rings i:nth-child(3) { animation-delay: 1.2s; }
  @keyframes ring { from { transform: scale(.6); opacity: 1; } to { transform: scale(5.2); opacity: 0; } }

  .subtitle { position: absolute; bottom: 44px; width: 100%; text-align: center; z-index: 25;
    opacity: 0; transition: opacity .5s; }
  .subtitle.on { opacity: 1; }
  .subtitle span { display: inline-block; background: rgba(0,0,0,.72); color: #ffe9e6;
    font-size: 23px; font-weight: 700; padding: 11px 26px; border-radius: 10px; letter-spacing: 1px; }
</style>
</head>
<body>
  <div class="shot on kb" id="sDesk"><img src="s3_desk.png"></div>
  <div class="shot" id="sSofa"><img src="s3_sofa.png"></div>
  <div class="shot" id="sSpk"><img src="s3_speaker.png"></div>
  <div class="shot" id="sRet"><img src="s3_return.png"></div>

  <div class="rings" id="rings"><i></i><i></i><i></i></div>

  <div class="hud">
    <div class="corner c1"></div><div class="corner c2"></div><div class="corner c3"></div><div class="corner c4"></div>
    <div class="rec"><span class="dot"></span>MONITORING</div>
    <div class="cam">CAM-01 LIVE <span id="clock">22:14:05</span></div>
    <div class="status" id="stOk">STATUS: 正常稼働 — 机に向かっています</div>
    <div class="status" id="stAn">STATUS: 解析中… 姿勢の変化を検出</div>
    <div class="status" id="stBk">STATUS: 復帰を確認 — 学習を再開 ✔</div>
  </div>

  <div class="alert" id="alert">
    <div class="vig"></div>
    <div class="banner"><span class="inner">⚠ INCIDENT DETECTED — ソファでのスマホ操作</span></div>
  </div>

  <div class="subtitle" id="sub"><span></span></div>

<script>
  const $ = (id) => document.getElementById(id)
  let sec = 0
  setInterval(() => {
    sec += 1
    const s = String(5 + sec % 60).padStart(2, '0')
    const m = String(14 + Math.floor((5 + sec) / 60)).padStart(2, '0')
    $('clock').textContent = `22:${m}:${s}`
  }, 1000)

  const show = (id, t) => setTimeout(() => $(id).classList.add('on'), t)
  const hide = (id, t) => setTimeout(() => $(id).classList.remove('on'), t)
  const swap = (a, b, t) => { hide(a, t); show(b, t) }

  show('stOk', 1200)
  swap('sDesk', 'sSofa', 8500)
  hide('stOk', 8500); show('stAn', 10800)
  hide('stAn', 12800); show('alert', 13000)

  swap('sSofa', 'sSpk', 16500)
  show('rings', 17000)
  const subs = [
    ['WARNING。インシデントを検知しました。', 17200],
    ['指定された「ソファでのスマホ操作」を確認。', 21500],
    ['速やかにデスクに戻り、学習を再開してください。', 25200],
  ]
  for (const [text, t] of subs) {
    setTimeout(() => {
      $('sub').querySelector('span').textContent = text
      $('sub').classList.add('on')
    }, t)
  }
  hide('sub', 29200); hide('alert', 28800); hide('rings', 29000)
  swap('sSpk', 'sRet', 29500)
  show('stBk', 31000)
</script>
</body>
</html>
