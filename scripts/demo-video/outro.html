<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 960px; height: 720px; overflow: hidden;
    font-family: "Hiragino Maru Gothic ProN", "Hiragino Sans", sans-serif;
    background: #f7f7f7; display: flex; align-items: center; justify-content: center;
  }
  .card {
    width: 760px; background: #fff; border-radius: 24px; padding: 52px 60px;
    box-shadow: 0 8px 0 rgba(0,0,0,.08); text-align: center;
  }
  h1 { color: #3c3c3c; font-size: 44px; font-weight: 800; }
  .loop {
    margin: 30px 0; display: flex; justify-content: center; gap: 14px; align-items: center;
    font-size: 26px; font-weight: 800;
  }
  .loop span { padding: 12px 24px; border-radius: 14px; color: #fff; }
  .loop .s1 { background: #1cb0f6; box-shadow: 0 4px 0 #1899d6; }
  .loop .s2 { background: #ff9600; box-shadow: 0 4px 0 #e08300; }
  .loop .s3 { background: #ff4b4b; box-shadow: 0 4px 0 #ea2b2b; }
  .loop .arrow { color: #afafaf; font-size: 30px; }
  p { color: #777; font-size: 20px; line-height: 1.7; white-space: nowrap; }
  .chips { margin-top: 30px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
  .chip {
    background: #e5f8d4; color: #46a302; font-size: 18px; font-weight: 700;
    padding: 8px 18px; border-radius: 999px;
  }
  .foot { margin-top: 34px; color: #afafaf; font-size: 17px; font-weight: 700; }
</style>
</head>
<body>
  <div class="card">
    <h1>サボり絶対しばく君 <span style="color:#afafaf;font-size:26px">(Focus Guardian)</span></h1>
    <div class="loop">
      <span class="s1">👁 知覚</span><span class="arrow">→</span>
      <span class="s2">🧠 判断</span><span class="arrow">→</span>
      <span class="s3">📢 行動</span>
    </div>
    <p>自由入力の悪習慣を AI が検知条件に構造化し、<br>カメラ画像を自律判定して、音声・BGM で作業に引き戻します。</p>
    <div class="chips">
      <span class="chip">ADK + Gemini 2.5 Flash Lite</span>
      <span class="chip">FastAPI</span>
      <span class="chip">React</span>
      <span class="chip">Cloud Run</span>
      <span class="chip">Cloud TTS</span>
      <span class="chip">Alexa (Voice Monkey)</span>
    </div>
    <div class="foot">DevOps × AI Agent Hackathon 2026</div>
  </div>
</body>
</html>
