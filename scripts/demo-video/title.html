<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 960px; height: 720px; overflow: hidden;
    font-family: "Hiragino Maru Gothic ProN", "Hiragino Sans", sans-serif;
    background: linear-gradient(160deg, #58cc02 0%, #46a302 60%, #3a8a02 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .deco { position: absolute; border-radius: 50%; background: rgba(255,255,255,.08); }
  .d1 { width: 380px; height: 380px; left: -120px; top: -120px; }
  .d2 { width: 260px; height: 260px; right: -60px; bottom: -80px; }
  .d3 { width: 120px; height: 120px; right: 140px; top: 80px; }
  .wrap { text-align: center; position: relative; }
  .eye {
    width: 130px; height: 130px; margin: 0 auto 30px; background: #fff; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 0 rgba(0,0,0,.15); font-size: 74px;
  }
  h1 {
    color: #fff; font-size: 76px; font-weight: 800; letter-spacing: 2px;
    text-shadow: 0 6px 0 rgba(0,0,0,.18);
  }
  .sub {
    margin-top: 26px; color: #eaffd6; font-size: 30px; font-weight: 700;
  }
  .badge {
    display: inline-block; margin-top: 40px; background: #fff; color: #46a302;
    font-size: 21px; font-weight: 800; padding: 12px 30px; border-radius: 999px;
    box-shadow: 0 5px 0 rgba(0,0,0,.15);
  }
</style>
</head>
<body>
  <div class="deco d1"></div><div class="deco d2"></div><div class="deco d3"></div>
  <div class="wrap">
    <div class="eye">👀</div>
    <h1>サボり絶対しばく君</h1>
    <div class="sub">Webカメラ × AI エージェントが、あなたのサボりを見逃さない</div>
    <div class="badge">DevOps × AI Agent Hackathon 2026</div>
  </div>
</body>
</html>
